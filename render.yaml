services:
  - type: web
    name: moleculemind-backend
    runtime: python
    repo: https://github.com/mindtechindustriesai-alt/moleculemind-backend
    plan: free
    branch: main
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
